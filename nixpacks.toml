[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "freetype",
  "harfbuzz",
  "ca-certificates",
  "ttf-dejavu",
]

[phases.install]
cmds = [
  "npm ci",
  "npx prisma generate",
  "PLAYWRIGHT_BROWSERS_PATH=/usr/bin npx playwright install chromium",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npx prisma db push && npm start"
