version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: govwatch
      POSTGRES_PASSWORD: govwatch123
      POSTGRES_DB: govwatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govwatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"   # Next.js + WebSocket proxy (both through port 3000)
    environment:
      DATABASE_URL: "postgresql://govwatch:govwatch123@db:5432/govwatch"
      NEXT_PUBLIC_WS_URL: "ws://localhost:3000"
      PORT: "3000"
      WORKER_PORT: "3003"
      NODE_ENV: "production"
      GROQ_API_KEY: "${GROQ_API_KEY}"   # set in your local .env file
    volumes:
      - artifacts_data:/app/artifacts

volumes:
  postgres_data:
  artifacts_data:
